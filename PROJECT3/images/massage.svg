<svg width="90" height="90" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frontCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3b3b"></stop>
      <stop offset="100%" stop-color="#b000ff"></stop>
    </linearGradient>

    <linearGradient id="backCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd1dc"></stop>
      <stop offset="100%" stop-color="#e7a5ff"></stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2"></feGaussianBlur>
    </filter>
  </defs>

  <!-- Back Card -->
  <rect x="25" y="20" width="38" height="38" rx="6" fill="url(#backCard)" opacity="0.9"></rect>

  <!-- Back Face -->
  <circle cx="37" cy="35" r="2" fill="#b54b6f"></circle>
  <circle cx="51" cy="35" r="2" fill="#b54b6f"></circle>
  <path d="M40 45 Q44 48 48 45" stroke="#b54b6f" stroke-width="2" fill="none" stroke-linecap="round"></path>

  <!-- Front Card -->
  <rect x="45" y="38" width="38" height="38" rx="6" fill="url(#frontCard)" filter="url(#glow)"></rect>

  <!-- Front Face -->
  <circle cx="57" cy="53" r="2" fill="#fff"></circle>
  <circle cx="71" cy="53" r="2" fill="#fff"></circle>
  <path d="M58 63 Q64 68 70 63" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round"></path>
</svg>